[gmail]
# The Gmail address to poll and send replies from
address = your.address@gmail.com

# Gmail App Password (NOT your normal Gmail password)
# How to get one:
#   1. Go to myaccount.google.com/security
#   2. Enable 2-Step Verification if not already on
#   3. Search for "App Passwords" in the search bar
#   4. Create one named e.g. "Field Service PDF"
#   5. Copy the 16-character password here (spaces don't matter)
app_password = xxxx xxxx xxxx xxxx

# How often to check for new emails (seconds)
poll_interval_seconds = 60
